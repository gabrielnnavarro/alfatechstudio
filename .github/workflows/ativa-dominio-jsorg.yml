name: Ativa dominio js.org

on:
  workflow_dispatch:
  schedule:
    # Verifica periodicamente se o js.org aprovou o subdominio.
    - cron: "17 */4 * * *"

permissions:
  contents: write

jobs:
  ativa-dominio:
    runs-on: ubuntu-latest

    steps:
      # Baixa o conteudo atual do repositório para verificar se o CNAME já existe.
      - name: Baixa o repositório
        uses: actions/checkout@v4

      # Consulta a API do GitHub para descobrir se o pull request do js.org foi aceito.
      - name: Verifica aprovacao do js.org
        id: verifica
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python <<'PY'
          import json
          import os
          import pathlib
          import urllib.request

          url = "https://api.github.com/repos/js-org/js.org/pulls/10836"
          request = urllib.request.Request(
              url,
              headers={
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "User-Agent": "alfatechstudio-domain-check",
              },
          )

          with urllib.request.urlopen(request) as response:
              pull_request = json.load(response)

          merged = bool(pull_request.get("merged_at"))
          cname_exists = pathlib.Path("CNAME").exists()

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"merged={'true' if merged else 'false'}\n")
              output.write(f"cname_exists={'true' if cname_exists else 'false'}\n")
          PY

      # Cria o arquivo de dominio customizado somente depois da aprovacao.
      - name: Cria o CNAME definitivo
        if: steps.verifica.outputs.merged == 'true' && steps.verifica.outputs.cname_exists != 'true'
        run: |
          printf 'alfatechstudio.js.org\n' > CNAME

      # Faz o commit automatico para ativar o dominio no GitHub Pages.
      - name: Publica a ativacao do dominio
        if: steps.verifica.outputs.merged == 'true' && steps.verifica.outputs.cname_exists != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CNAME
          git commit -m "Ativa dominio alfatechstudio.js.org"
          git push
