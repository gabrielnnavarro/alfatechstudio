  <rect width="512" height="512" rx="132" fill="url(#bg)" />
  <circle cx="102" cy="104" r="110" fill="#2ee6a6" fill-opacity="0.14" />
  <circle cx="430" cy="98" r="92" fill="#ff8c42" fill-opacity="0.12" />
  <rect x="124" y="124" width="264" height="264" rx="88" fill="#ffffff" fill-opacity="0.08" />
  <text
